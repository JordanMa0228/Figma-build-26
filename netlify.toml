# Netlify deployment configuration for Focus Time frontend

[build]
  # Build command
  command = "npm run build"
  # Output directory (Vite builds to dist/)
  publish = "dist"

[build.environment]
  # Node.js version
  NODE_VERSION = "20"

# SPA routing: redirect all paths to index.html (required for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
