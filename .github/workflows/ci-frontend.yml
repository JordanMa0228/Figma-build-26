name: Frontend CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.js'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://figma-backend-production.up.railway.app
